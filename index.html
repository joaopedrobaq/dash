<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>PBQ</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PBQ" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <header>
      <h1><img src="icon.svg" alt="" class="header-logo" />PBQ</h1>
    </header>

    <main class="dashboard">
      <section class="card" id="card-esquerda">
        <h2>Ferramentas</h2>
        <nav class="tools-menu">
          <a class="tool-item" href="#" onclick="openTool(event, 'honorarios')">
            <div class="tool-icon">⚖</div>
            <div class="tool-info">
              <div class="tool-name">Honorários – Fazenda</div>
              <div class="tool-desc">Art. 85, §3º CPC · cálculo progressivo</div>
            </div>
          </a>
          <a class="tool-item" href="#" onclick="openTool(event, 'prazos')">
            <div class="tool-icon">📅</div>
            <div class="tool-info">
              <div class="tool-name">Prazos Processuais</div>
              <div class="tool-desc">Cálculo de prazos · calendário visual</div>
            </div>
          </a>
        </nav>
      </section>

      <section class="card" id="card-tool">
        <div class="card-tool-header">
          <button class="btn-tool-back" onclick="closeTool()">← Tarefas</button>
          <span id="tool-title"></span>
        </div>
        <div id="tool-content"></div>
      </section>

      <section class="card panel-active" id="card-todo">
        <h2>Tarefas <span id="sync-status"></span></h2>

        <form id="todo-form" autocomplete="off">
          <div class="todo-inputs">
            <input id="f-cliente" type="text" placeholder="Cliente" />
            <input id="f-tema"    type="text" placeholder="Tema" />
            <input id="f-pasta"   type="text" placeholder="Pasta" />
            <button type="submit">+</button>
          </div>
          <div id="todo-prio-selector"></div>
        </form>

        <table id="todo-table">
          <thead>
            <tr>
              <th></th>
              <th>Cliente</th>
              <th>Tema</th>
              <th>Pasta</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="todo-body"></tbody>
        </table>
      </section>

      <section class="card" id="card-emails">
        <div class="card-header-row">
          <h2>Extrator de E-mails</h2>
          <button id="btn-limpar-emails">Limpar</button>
        </div>
        <textarea id="texto" placeholder="Cole aqui o texto com e-mails..."></textarea>
        <p class="label">E-mails extraídos (exceto @bomfimnovis.com.br):</p>
        <div id="resultado" title="Clique para copiar"></div>
      </section>
    </main>

    <nav class="mobile-nav">
      <button class="nav-tab active" data-target="card-todo">
        <span class="nav-icon">✓</span>
        <span class="nav-label">Tarefas</span>
      </button>
      <button class="nav-tab" data-target="card-emails">
        <span class="nav-icon">@</span>
        <span class="nav-label">E-mails</span>
      </button>
      <button class="nav-tab" data-target="card-esquerda">
        <span class="nav-icon">⚙</span>
        <span class="nav-label">Ferramentas</span>
      </button>
    </nav>

    <script src="tools/honorarios.js"></script>
    <script src="tools/prazos.js"></script>
    <script src="config.js"></script>
    <script src="db.js"></script>
    <script src="emails.js"></script>
    <script src="todo.js"></script>
    <script src="app.js"></script>
  </body>
</html>
